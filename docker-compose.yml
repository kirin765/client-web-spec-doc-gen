services:
  postgres:
    image: postgres:16-alpine
    container_name: spec-gen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spec_gen_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - spec-gen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d spec_gen_dev']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: spec-gen-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - spec-gen-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  spec-gen-postgres-data:
  spec-gen-redis-data:
